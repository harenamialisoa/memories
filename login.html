<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Find me in the river</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-left-brand"> Find me in the river</div>
      <p class="auth-left-sub">"L'amour est la poésie des sens."</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <a href="index.html" class="auth-back">← Retour au site</a>
      <h2 class="auth-title">Connexion</h2>
      <p class="auth-sub">Espace réservé à l'administrateur</p>

      <div id="auth-error" class="auth-error" style="display:none;"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="votre@email.com" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn-primary full" id="login-btn" onclick="handleLogin()">Entrer</button>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('auth-error');

      if (!email || !password) { showErr('Veuillez remplir tous les champs.'); return; }

      btn.textContent = 'Connexion...';
      btn.disabled = true;
      err.style.display = 'none';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'admin.html';
      } catch (e) {
        showErr(e.message || 'Identifiants incorrects.');
        btn.textContent = 'Entrer';
        btn.disabled = false;
      }
    }

    function showErr(msg) {
      const err = document.getElementById('auth-error');
      err.textContent = msg;
      err.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
